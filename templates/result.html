<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Result</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <nav>
      <div class="logo">SkinCareAI</div>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/predict_page">Predict</a></li>
        <li><a href="/login">Logout</a></li>
      </ul>
    </nav>
  </header>

  <section class="result-section">
    <h2>Prediction Result</h2>
    <img src="{{ url_for('static', filename='uploads/' + image) }}" alt="Uploaded Image" class="uploaded-img">
    <p><strong>Predicted Class:</strong> {{ predicted_class }}</p>
    <p><strong>Confidence:</strong> {{ confidence }}</p>
    <a href="/predict_page" class="btn">Try Another Image</a>
  </section>

  <footer>
    <p>&copy; 2025 SkinCareAI. All rights reserved.</p>
  </footer>
</body>
</html>
